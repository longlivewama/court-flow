user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # ── Performance ────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;
  gzip_min_length 1000;

  # ── Rate limiting zones ────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api_upload:10m  rate=20r/m;

  # ── Upstream name resolution ───────────────────────────────
  # Use Docker's embedded DNS (127.0.0.11) and resolve upstream hostnames
  # through variables so nginx resolves them per-request at runtime instead
  # of at config-load. Without this, a missing/late 'api' container makes
  # nginx fail to boot with "host not found in upstream" and crash-loop.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # ── HTTP → HTTPS redirect ─────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS server ──────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name courtflow.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # HSTS (SRS §15)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 12M;   # allow up to 12MB for receipt uploads

    # ── API routes ──────────────────────────────────────────
    location /api/auth/ {
      limit_req zone=api_auth burst=20 nodelay;
      set                $api_upstream http://api:4000;
      proxy_pass         $api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/bookings/[^/]+/receipt {
      limit_req zone=api_upload burst=10 nodelay;
      set                $api_upstream http://api:4000;
      proxy_pass         $api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
      limit_req zone=api_general burst=60 nodelay;
      set                $api_upstream http://api:4000;
      proxy_pass         $api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend (Next.js) ─────────────────────────────────
    location / {
      set                $frontend_upstream http://frontend:3000;
      proxy_pass         $frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
