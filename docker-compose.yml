version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: courtflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       courtflow
      POSTGRES_USER:     courtflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-courtflow_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: courtflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courtflow_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      NODE_ENV:     development
      DATABASE_URL: postgresql://courtflow:${POSTGRES_PASSWORD:-courtflow_pass}@postgres:5432/courtflow
      # backend/.env points this at 127.0.0.1 (host-oriented); inside the container it must target the postgres service
      DATABASE_URL_AUDIT: postgresql://audit_writer:${AUDIT_DB_PASSWORD:-CHANGE_IN_PRODUCTION}@postgres:5432/courtflow?sslmode=disable
      REDIS_URL:    redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      PORT:         4000
    volumes:
      - uploads:/app/uploads
      - ./backend/keys:/app/keys:ro
    ports:
      - "4000:4000"

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://localhost/api
    container_name: courtflow_frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: https://localhost/api
    # Served through nginx (frontend:3000 on the compose network); no host port
    # publish so :3000 stays free for local `next dev`.
    expose:
      - "3000"

  # ── Nginx reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: courtflow_nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local
