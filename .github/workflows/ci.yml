name: CI

on:
  push:
    branches: [main]
  pull_request:

# Scope: backend type-checking + unit tests (with the coverage gate). This is
# the automated gate for the application-layer test coverage added alongside
# the Batch 1 security fixes.
#
# NOT yet gated (pre-existing tech debt, tracked separately — do not add here
# until fixed): `npm run lint` fails repo-wide — the backend script still uses
# the ESLint 8 `--ext` flag with no ESLint 9 flat config, and the frontend has
# ~35 react-hooks/react-compiler rule violations across existing components.
jobs:
  backend:
    name: Backend — typecheck & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Unit tests (with coverage gate)
        run: npm test
